<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIGGE MARCH MADNESS SCOREBOARD</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2d45;
      --accent: #1d4ed8;
      --accent2: #3b82f6;
      --gold: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --live: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* 16:9 container — always fills viewport, letterboxed if needed */
    .viewport {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050810;
    }

    .canvas {
      width: 100%;
      height: 100%;
      max-width: calc(100vh * 16 / 9);
      max-height: calc(100vw * 9 / 16);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1vh 2vw;
      background: linear-gradient(90deg, #0f1f40 0%, #0a0e1a 60%, #0f1f40 100%);
      border-bottom: 2px solid var(--accent);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.2vw;
    }

    .logo-badge {
      background: var(--accent);
      border-radius: 0.5vw;
      padding: 0.4vh 0.8vw;
      font-size: clamp(10px, 1.1vw, 18px);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header h1 {
      font-size: clamp(12px, 1.6vw, 28px);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5vw;
      font-size: clamp(10px, 0.95vw, 16px);
      color: var(--muted);
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.4vw;
      color: var(--live);
      font-weight: 700;
      font-size: clamp(9px, 0.85vw, 14px);
    }

    .live-dot::before {
      content: '';
      width: 0.5vw;
      height: 0.5vw;
      min-width: 6px;
      min-height: 6px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Main layout */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
      min-height: 0;
    }

    .panel.live-panel {
      grid-row: 1 / 3;
    }

    /* Panels */
    .panel {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.6vw;
      padding: 0.8vh 1.5vw;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: clamp(9px, 0.85vw, 14px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .count-badge {
      background: var(--accent);
      border-radius: 100px;
      padding: 0.1vh 0.5vw;
      font-size: clamp(8px, 0.7vw, 12px);
      font-weight: 700;
      color: white;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.8vh 1.2vw;
      display: flex;
      flex-direction: column;
      gap: 0.6vh;
      min-height: 0;
    }

    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Game cards */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5vw;
      padding: 0.9vh 1.2vw;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 0.5vw;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .game-card.live {
      border-color: rgb(128 249 182 / 40%);
      background: linear-gradient(135deg, #180d0d 0%, var(--surface) 60%);
    }

    .last-play-label {
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.06em;
    }

    .top-performers {
      grid-column: 1 / -1;
      display: flex;
      gap: 0.8vw;
      padding-top: 0.5vh;
      border-top: 1px solid var(--border);
      margin-top: 0.2vh;
    }

    .performer {
      display: flex;
      align-items: center;
      gap: 0.4vw;
      flex: 1;
      min-width: 0;
    }

    .performer-team-logo {
      width: clamp(14px, 1.4vw, 24px);
      height: clamp(14px, 1.4vw, 24px);
      object-fit: contain;
      flex-shrink: 0;
    }

    .performer-headshot {
      width: clamp(22px, 2.2vw, 40px);
      height: clamp(22px, 2.2vw, 40px);
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .performer-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .performer-name {
      font-size: clamp(9px, 0.85vw, 14px);
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .performer-stat {
      font-size: clamp(8px, 0.75vw, 12px);
      color: var(--muted);
      white-space: nowrap;
    }

    .last-play-team {
      font-weight: 700;
      color: #fff;
    }

    .last-play {
      grid-column: 1 / -1;
      font-size: clamp(10px, 1vw, 17px);
      color: #c8c8c8;
      border-top: 1px solid var(--border);
      padding-top: 0.5vh;
      margin-top: 0.2vh;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .game-card.final {
      opacity: 0.7;
    }

    .game-teams {
      display: flex;
      flex-direction: column;
      gap: 0.35vh;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 0.6vw;
    }

    .team-logo {
      width: clamp(16px, 1.6vw, 28px);
      height: clamp(16px, 1.6vw, 28px);
      object-fit: contain;
      flex-shrink: 0;
    }

    .team-logo-placeholder {
      width: clamp(16px, 1.6vw, 28px);
      height: clamp(16px, 1.6vw, 28px);
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(7px, 0.65vw, 11px);
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }

    .seed-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(14px, 1.4vw, 22px);
      height: clamp(14px, 1.4vw, 22px);
      padding: 0 0.25vw;
      border-radius: 0.25vw;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.25);
      font-size: clamp(7px, 0.65vw, 11px);
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: 0;
    }

    .team-name {
      font-size: clamp(10px, 1vw, 16px);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 14vw;
    }

    .team-record {
      font-size: clamp(8px, 0.7vw, 11px);
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    .team-winner .team-name { color: white; }

    .game-scores {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 0.35vh;
      border-right: 1px solid var(--border);
      padding-right: 0.8vw;
    }

    .score {
      font-size: clamp(14px, 1.6vw, 28px);
      font-weight: 900;
      min-width: 2.5vw;
      text-align: right;
      line-height: 1;
    }

    .score.winner { color: white; }
    .score.loser { color: var(--muted); }

    .game-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-left: 0.6vw;
      min-width: 5vw;
      gap: 0.15vh;
    }

    .status-label {
      font-size: clamp(8px, 0.75vw, 13px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .status-label.live { color: var(--live); }
    .status-label.final { color: var(--muted); }
    .status-label.scheduled { color: var(--accent2); }

    .status-detail {
      font-size: clamp(7px, 0.65vw, 11px);
      color: var(--muted);
      text-align: center;
    }

    /* Live timer — period + clock */
    .status-period {
      font-size: clamp(8px, 0.7vw, 12px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--live);
      text-align: center;
      line-height: 1;
    }

    .status-clock {
      font-size: clamp(14px, 1.7vw, 30px);
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .status-ou {
      font-size: clamp(7px, 0.7vw, 12px);
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
    }

    .team-spread {
      font-size: clamp(8px, 0.75vw, 13px);
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Stat strip (H/E) */
    .stat-strip {
      display: flex;
      gap: 1vw;
      padding-top: 0.4vh;
      border-top: 1px solid var(--border);
      margin-top: 0.4vh;
      grid-column: 1 / -1;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.3vw;
      font-size: clamp(7px, 0.65vw, 11px);
      color: var(--muted);
    }

    .stat-item span { color: var(--text); font-weight: 600; }

    /* Venue */
    .venue-info {
      font-size: clamp(7px, 0.65vw, 11px);
      color: var(--muted);
      margin-top: 0.3vh;
    }

    /* Upcoming card */
    .upcoming-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5vw;
      padding: 0.9vh 1.2vw;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.8vw;
      flex-shrink: 0;
    }

    .upcoming-time {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 4.5vw;
      border-right: 1px solid var(--border);
      padding-right: 0.8vw;
    }

    .upcoming-time .time {
      font-size: clamp(13px, 1.35vw, 22px);
      font-weight: 800;
      color: var(--accent2);
      line-height: 1.1;
    }

    .upcoming-time .ampm {
      font-size: clamp(9px, 0.8vw, 13px);
      color: var(--muted);
      font-weight: 600;
    }

    .upcoming-matchup {
      display: flex;
      flex-direction: column;
      gap: 0.15vh;
    }

    .upcoming-team {
      font-size: clamp(12px, 1.25vw, 20px);
      font-weight: 600;
    }

    #upcoming-panel .seed-badge {
      min-width: clamp(16px, 1.65vw, 26px);
      height: clamp(16px, 1.65vw, 26px);
      font-size: clamp(8px, 0.78vw, 13px);
    }

    .upcoming-vs {
      font-size: clamp(9px, 0.85vw, 14px);
      color: var(--muted);
      font-weight: 400;
      margin: 0 0.25vw;
    }

    .upcoming-venue {
      font-size: clamp(8px, 0.75vw, 13px);
      color: var(--muted);
      text-align: right;
    }

    .upcoming-odds {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2vh;
      border-left: 1px solid var(--border);
      padding-left: 0.8vw;
    }

    .upcoming-spread {
      font-size: clamp(10px, 1vw, 17px);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .upcoming-ou {
      font-size: clamp(8px, 0.8vw, 13px);
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Summary panel */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1vh 1vw;
      padding: 1vh 1.5vw;
      flex: 1;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5vw;
      padding: 1.2vh 1vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4vh;
    }

    .stat-box .value {
      font-size: clamp(20px, 3vw, 52px);
      font-weight: 900;
      line-height: 1;
    }

    .stat-box .label {
      font-size: clamp(8px, 0.75vw, 13px);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .stat-box .value.live-color { color: var(--live); }
    .stat-box .value.blue { color: var(--accent2); }
    .stat-box .value.green { color: var(--green); }
    .stat-box .value.gold { color: var(--gold); }

    /* Footer */
    footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6vh 2vw;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: clamp(8px, 0.72vw, 12px);
      color: var(--muted);
    }

    .footer-ticker {
      display: flex;
      align-items: center;
      gap: 1vw;
      overflow: hidden;
      flex: 1;
    }

    .ticker-label {
      background: var(--accent);
      padding: 0.15vh 0.5vw;
      border-radius: 0.2vw;
      font-weight: 700;
      font-size: clamp(7px, 0.65vw, 11px);
      color: white;
      white-space: nowrap;
    }

    .ticker-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .refresh-info {
      white-space: nowrap;
      padding-left: 1vw;
    }

    /* Loading / error */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 1vh;
      color: var(--muted);
      font-size: clamp(10px, 1vw, 16px);
    }

    .spinner {
      width: 2vw;
      height: 2vw;
      min-width: 20px;
      min-height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { color: var(--muted); font-size: clamp(9px, 0.85vw, 14px); padding: 2vh 0; text-align: center; }

    /* ── Live panel: expand cards to fill available height (max 5 games) ── */
    #live-panel {
      gap: 1.45vh;
      padding: 0.5vh 1.2vw;
    }
    #live-panel .game-card.live {
      flex: 1 1 0;
      min-height: 0;
      max-height: 33.333%;
      align-items: stretch;
      padding: 0.5vh 1.2vw;
    }
    #live-panel .game-teams,
    #live-panel .game-scores {
      align-self: stretch;
      justify-content: space-evenly;
      gap: 0;
    }
    #live-panel .stat-strip {
      display: none;
    }
    #live-panel .team-logo,
    #live-panel .team-logo-placeholder {
      width: clamp(24px, 2.8vw, 48px);
      height: clamp(24px, 2.8vw, 48px);
      font-size: clamp(9px, 0.9vw, 15px);
    }
    #live-panel .team-name {
      font-size: clamp(16px, 2.3vw, 38px);
      font-weight: 700;
      max-width: 20vw;
    }
    #live-panel .team-row {
      align-items: center;
    }
    #live-panel .score {
      font-size: clamp(26px, 3.4vw, 58px);
    }
    #live-panel .seed-badge {
      min-width: clamp(20px, 2.1vw, 34px);
      height: clamp(20px, 2.1vw, 34px);
      font-size: clamp(10px, 1.1vw, 18px);
    }
    #live-panel .game-status {
      align-self: center;
      min-width: 6vw;
      gap: 0.25vh;
    }
    #live-panel .status-period {
      font-size: clamp(12px, 1.3vw, 22px);
    }
    #live-panel .status-clock {
      font-size: clamp(20px, 2.6vw, 46px);
    }
    #live-panel .status-ou {
      font-size: clamp(11px, 1.15vw, 19px);
      margin-top: 0.3vh;
    }
    #live-panel .team-spread {
      font-size: clamp(13px, 1.6vw, 26px);
    }

    /* Next-up cards (shown in live panel when no games are live) */
    .game-card.next-up {
      border-color: rgba(255, 200, 80, 0.3);
      background: linear-gradient(135deg, #141008 0%, var(--surface) 60%);
    }

    .countdown-timer {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .next-up-label {
      font-size: clamp(8px, 0.75vw, 12px);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255, 200, 80, 0.7);
      text-transform: uppercase;
      margin-bottom: 0.2vh;
    }

    /* 6+ live games — hide supplemental data to save space */
    #live-panel.many-games .last-play,
    #live-panel.many-games .top-performers {
      display: none;
    }

    /* 4 live games — scale down moderately */
    #live-panel[data-count="4"] .team-name  { font-size: clamp(13px, 1.8vw, 30px); }
    #live-panel[data-count="4"] .score      { font-size: clamp(20px, 2.6vw, 44px); }
    #live-panel[data-count="4"] .status-clock  { font-size: clamp(15px, 2vw, 34px); }
    #live-panel[data-count="4"] .status-period { font-size: clamp(10px, 1.1vw, 18px); }
    #live-panel[data-count="4"] .status-ou     { font-size: clamp(9px, 0.95vw, 15px); }
    #live-panel[data-count="4"] .team-spread   { font-size: clamp(10px, 1.2vw, 20px); }
    #live-panel[data-count="4"] .seed-badge    { min-width: clamp(16px, 1.7vw, 28px); height: clamp(16px, 1.7vw, 28px); font-size: clamp(8px, 0.9vw, 14px); }
    #live-panel[data-count="4"] .team-logo,
    #live-panel[data-count="4"] .team-logo-placeholder { width: clamp(18px, 2.2vw, 38px); height: clamp(18px, 2.2vw, 38px); }
    #live-panel[data-count="4"] .last-play  { font-size: clamp(8px, 0.85vw, 14px); }
    #live-panel[data-count="4"] .performer-headshot { width: clamp(18px, 1.8vw, 32px); height: clamp(18px, 1.8vw, 32px); }
    #live-panel[data-count="4"] .performer-name { font-size: clamp(8px, 0.75vw, 12px); }
    #live-panel[data-count="4"] .performer-stat { font-size: clamp(7px, 0.65vw, 11px); }

    /* 5 live games — scale down more aggressively */
    #live-panel[data-count="5"] .team-name  { font-size: clamp(11px, 1.5vw, 24px); }
    #live-panel[data-count="5"] .score      { font-size: clamp(16px, 2.1vw, 36px); }
    #live-panel[data-count="5"] .status-clock  { font-size: clamp(12px, 1.6vw, 28px); }
    #live-panel[data-count="5"] .status-period { font-size: clamp(8px, 0.9vw, 15px); }
    #live-panel[data-count="5"] .status-ou     { font-size: clamp(8px, 0.8vw, 13px); }
    #live-panel[data-count="5"] .team-spread   { font-size: clamp(9px, 1vw, 17px); }
    #live-panel[data-count="5"] .seed-badge    { min-width: clamp(14px, 1.4vw, 22px); height: clamp(14px, 1.4vw, 22px); font-size: clamp(7px, 0.75vw, 12px); }
    #live-panel[data-count="5"] .team-logo,
    #live-panel[data-count="5"] .team-logo-placeholder { width: clamp(16px, 1.8vw, 30px); height: clamp(16px, 1.8vw, 30px); }
    #live-panel[data-count="5"] .last-play  { font-size: clamp(7px, 0.75vw, 12px); }
    #live-panel[data-count="5"] .performer-headshot { width: clamp(16px, 1.5vw, 26px); height: clamp(16px, 1.5vw, 26px); }

<script>
const API_BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard';
function todayDateStr() {
  return new Date().toISOString().slice(0, 10).replace(/-/g, '');
}

// ── Helpers ────────────────────────────────────────────────────────────────

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function splitTime(iso) {
  const d = new Date(iso);
  const str = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const parts = str.split(' ');
  return { time: parts[0], ampm: parts[1] || '' };
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function getStatusGroup(event) {
  const comp = event.competitions?.[0];
  const type = comp?.status?.type?.name || '';
  if (type.includes('IN_PROGRESS') || type.includes('HALFTIME')) return 'live';
  if (type.includes('FINAL') || type.includes('POSTGAME')) return 'final';
  return 'upcoming';
}

function getCompetitor(comp, homeAway) {
  return comp.competitors?.find(c => c.homeAway === homeAway) || {};
}

function logoEl(team) {
  const url = team?.logos?.[0]?.href || team?.logo;
  if (url) {
    const img = document.createElement('img');
    img.className = 'team-logo';
    img.src = url;
    img.alt = team.abbreviation || '';
    img.onerror = () => img.replaceWith(abbrevEl(team));
    return img;
  }
  return abbrevEl(team);
}

function abbrevEl(team) {
  const div = document.createElement('div');
  div.className = 'team-logo-placeholder';
  div.textContent = (team?.abbreviation || '??').slice(0, 3);
  return div;
}

// ── Card builders ──────────────────────────────────────────────────────────

function buildGameCard(event, group) {
  const comp = event.competitions[0];
  const home = getCompetitor(comp, 'home');
  const away = getCompetitor(comp, 'away');
  if (group === 'live') {
  }
  const status = comp.status;
  const statusType = status?.type?.name || '';
  const statusDetail = status?.type?.shortDetail || status?.type?.detail || '';
  const venue = comp.venue?.fullName || '';
  const venueCity = comp.venue?.address?.city || '';

  const homeScore = parseInt(home.score || 0, 10);
  const awayScore = parseInt(away.score || 0, 10);
  const isFinal = group === 'final';
  const isLive = group === 'live';

  const card = document.createElement('div');
  card.className = `game-card ${group}`;

  // Determine winner for final games
  const homeWins = isFinal && homeScore > awayScore;
  const awayWins = isFinal && awayScore > homeScore;

  // Parse spread from odds details, e.g. "Auburn -22.5"
  let awaySpread = null, homeSpread = null;
  if (isLive) {
    const oddsDetails = comp.odds?.[0]?.details || '';
    const m = oddsDetails.match(/^(.+?)\s+([+-]?\d+\.?\d*)$/);
    if (m) {
      const favoredFragment = m[1].trim().toLowerCase();
      const spreadVal = parseFloat(m[2]);
      const awayName = (away.team?.shortDisplayName || '').toLowerCase();
      const awayFavored = awayName && favoredFragment.includes(awayName.split(' ')[0]);
      if (awayFavored) {
        awaySpread = m[2];
        homeSpread = spreadVal < 0 ? `+${Math.abs(spreadVal)}` : `-${spreadVal}`;
      } else {
        homeSpread = m[2];
        awaySpread = spreadVal < 0 ? `+${Math.abs(spreadVal)}` : `-${spreadVal}`;
      }
    }
  }

  function teamRow(competitor, wins, loses, spread) {
    const row = document.createElement('div');
    row.className = `team-row${wins ? ' team-winner' : ''}`;
    row.appendChild(logoEl(competitor.team || {}));

    const seed = competitor.curatedRank?.current;
    if (seed && seed <= 16) {
      const badge = document.createElement('span');
      badge.className = 'seed-badge';
      badge.textContent = seed;
      row.appendChild(badge);
    }

    const nameEl = document.createElement('span');
    nameEl.className = 'team-name';
    nameEl.textContent = competitor.team?.shortDisplayName || competitor.team?.displayName || 'TBD';
    row.appendChild(nameEl);

    if (spread != null) {
      const spreadEl = document.createElement('span');
      spreadEl.className = 'team-spread';
      spreadEl.textContent = spread;
      row.appendChild(spreadEl);
    }

    return row;
  }

  const teamsDiv = document.createElement('div');
  teamsDiv.className = 'game-teams';
  teamsDiv.appendChild(teamRow(away, awayWins, !awayWins && isFinal, awaySpread));
  teamsDiv.appendChild(teamRow(home, homeWins, !homeWins && isFinal, homeSpread));

  // Venue strip — only show for live games, not finals
  if (venue && isLive) {
    const strip = document.createElement('div');
    strip.className = 'stat-strip';
    const v = document.createElement('div');
    v.className = 'venue-info';
    v.textContent = venueCity ? `${venue}, ${venueCity}` : venue;
    strip.appendChild(v);
    teamsDiv.appendChild(strip);
  }

  card.appendChild(teamsDiv);

  // Score column
  const scoresDiv = document.createElement('div');
  scoresDiv.className = 'game-scores';

  const scoreA = document.createElement('div');
  scoreA.className = `score ${awayWins ? 'winner' : isFinal ? 'loser' : ''}`;
  scoreA.textContent = (isLive || isFinal) ? awayScore : '';
  scoresDiv.appendChild(scoreA);

  const scoreH = document.createElement('div');
  scoreH.className = `score ${homeWins ? 'winner' : isFinal ? 'loser' : ''}`;
  scoreH.textContent = (isLive || isFinal) ? homeScore : '';
  scoresDiv.appendChild(scoreH);

  card.appendChild(scoresDiv);

  // Status column
  const statusDiv = document.createElement('div');
  statusDiv.className = 'game-status';

  if (group === 'live') {
    // Parse "2nd - 14:32" → period label + clock, or "Half" → just label
    const detail = statusDetail.toLowerCase();
    let periodLabel = 'LIVE';
    let clock = '';
    if (detail === 'half' || detail === 'halftime') {
      periodLabel = 'HALF';
    } else {
      const dash = statusDetail.indexOf('-');
      if (dash > -1) {
        periodLabel = statusDetail.slice(0, dash).trim().toUpperCase(); // "1ST" / "2ND"
        clock = statusDetail.slice(dash + 1).trim();                    // "14:32"
      } else {
        periodLabel = statusDetail || 'LIVE';
      }
    }
    const perEl = document.createElement('div');
    perEl.className = 'status-period';
    perEl.textContent = periodLabel;
    statusDiv.appendChild(perEl);
    if (clock) {
      const clockEl = document.createElement('div');
      clockEl.className = 'status-clock';
      clockEl.textContent = clock;
      statusDiv.appendChild(clockEl);
    }
    const overUnder = comp.odds?.[0]?.overUnder;
    if (overUnder != null) {
      const ouEl = document.createElement('div');
      ouEl.className = 'status-ou';
      ouEl.textContent = `O/U ${overUnder % 1 === 0 ? overUnder + '.0' : overUnder}`;
      statusDiv.appendChild(ouEl);
    }
  } else if (group === 'final') {
    const lbl = document.createElement('div');
    lbl.className = 'status-label final';
    lbl.textContent = 'FINAL';
    statusDiv.appendChild(lbl);
    const dateEl = document.createElement('div');
    dateEl.className = 'status-detail';
    dateEl.textContent = new Date(event.date).toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
    statusDiv.appendChild(dateEl);
  } else {
    const lbl = document.createElement('div');
    lbl.className = 'status-label scheduled';
    lbl.textContent = 'TODAY';
    statusDiv.appendChild(lbl);
  }

  card.appendChild(statusDiv);

  if (isLive) {
    const lastPlay = comp.situation?.lastPlay;
    const lastPlayText = lastPlay?.text;
    if (lastPlayText) {
      const lpEl = document.createElement('div');
      lpEl.className = 'last-play';
      const lastPlayTeamId = lastPlay?.team?.id;
      let teamLabel = '';
      if (lastPlayTeamId) {
        const matched = lastPlayTeamId === away.team?.id ? away.team : lastPlayTeamId === home.team?.id ? home.team : null;
        if (matched) teamLabel = matched.shortDisplayName || matched.displayName || matched.abbreviation || '';
      }
      lpEl.innerHTML = teamLabel
        ? `<span class="last-play-label">Last Play:</span> <span class="last-play-team">${teamLabel}</span> &ndash; ${lastPlayText}`
        : `<span class="last-play-label">Last Play:</span> ${lastPlayText}`;
      card.appendChild(lpEl);
    }

    // Normalize a leaders array (handles both category and flat formats)
    const normalizeLeaders = arr => {
      const out = [];
      (arr || []).forEach(item => {
        if (item.leaders?.length) {
          item.leaders.forEach(l => out.push({ label: item.shortDisplayName || item.displayName || '', ...l }));
        } else if (item.athlete) {
          out.push({ label: item.shortDisplayName || item.displayName || '', ...item });
        }
      });
      return out;
    };

    const isPtsReb = l => /point|pts/i.test(l.label) || /reb/i.test(l.label);
    const awayComp = comp.competitors?.find(c => c.homeAway === 'away');
    const homeComp = comp.competitors?.find(c => c.homeAway === 'home');
    const awayNorm = normalizeLeaders(awayComp?.leaders);
    const homeNorm = normalizeLeaders(homeComp?.leaders);
    const compNorm = normalizeLeaders(comp.leaders);

    // Best pts/reb leader from each team (fallback to any leader)
    const bestFrom = leaders => leaders.find(isPtsReb) || leaders[0] || null;
    const awayTop = bestFrom(awayNorm);
    const homeTop = bestFrom(homeNorm);

    // Build final list: 1 from each team guaranteed, then fill to 3 from remainder
    const shown = [];
    const shownIds = new Set();
    const tryAdd = l => {
      if (!l?.athlete?.id || shownIds.has(l.athlete.id)) return;
      shown.push(l);
      shownIds.add(l.athlete.id);
    };
    tryAdd(awayTop);
    tryAdd(homeTop);
    [...awayNorm, ...homeNorm, ...compNorm].forEach(l => {
      if (shown.length < 3 && isPtsReb(l)) tryAdd(l);
    });

    if (shown.length) {
      const performersDiv = document.createElement('div');
      performersDiv.className = 'top-performers';

      shown.forEach(category => {
        const leader = category;
        const athlete = leader?.athlete;
        if (!athlete) return;

        const p = document.createElement('div');
        p.className = 'performer';

        // Team logo
        const athleteTeamId = athlete.team?.id;
        const matchedTeam = athleteTeamId === away.team?.id ? away.team : athleteTeamId === home.team?.id ? home.team : athlete.team || null;
        if (matchedTeam) {
          const tl = logoEl(matchedTeam);
          tl.className = 'performer-team-logo';
          p.appendChild(tl);
        }

        // Player headshot
        const headshotUrl = athlete.headshot?.href || (typeof athlete.headshot === 'string' ? athlete.headshot : null);
        if (headshotUrl) {
          const img = document.createElement('img');
          img.className = 'performer-headshot';
          img.src = headshotUrl;
          img.alt = athlete.shortName || '';
          img.onerror = () => img.remove();
          p.appendChild(img);
        }

        const info = document.createElement('div');
        info.className = 'performer-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'performer-name';
        nameEl.textContent = athlete.shortName || athlete.displayName || '';
        info.appendChild(nameEl);

        const statEl = document.createElement('div');
        statEl.className = 'performer-stat';
        statEl.textContent = `${leader.displayValue} ${leader.label}`;
        info.appendChild(statEl);

        p.appendChild(info);
        performersDiv.appendChild(p);
      });

      if (performersDiv.children.length) card.appendChild(performersDiv);
    }
  }

  return card;
}

function buildNextUpCard(event) {
  const comp = event.competitions[0];
  const home = getCompetitor(comp, 'home');
  const away = getCompetitor(comp, 'away');

  const card = document.createElement('div');
  card.className = 'game-card next-up';

  function teamRow(competitor) {
    const row = document.createElement('div');
    row.className = 'team-row';
    row.appendChild(logoEl(competitor.team || {}));
    const seed = competitor.curatedRank?.current;
    if (seed && seed <= 16) {
      const b = document.createElement('span');
      b.className = 'seed-badge';
      b.textContent = seed;
      row.appendChild(b);
    }
    const nameEl = document.createElement('span');
    nameEl.className = 'team-name';
    nameEl.textContent = competitor.team?.shortDisplayName || competitor.team?.displayName || 'TBD';
    row.appendChild(nameEl);
    return row;
  }

  const teamsDiv = document.createElement('div');
  teamsDiv.className = 'game-teams';
  teamsDiv.appendChild(teamRow(away));
  teamsDiv.appendChild(teamRow(home));
  card.appendChild(teamsDiv);

  // Dash placeholders for scores
  const scoresDiv = document.createElement('div');
  scoresDiv.className = 'game-scores';
  [1, 2].forEach(() => {
    const s = document.createElement('div');
    s.className = 'score';
    s.textContent = '—';
    scoresDiv.appendChild(s);
  });
  card.appendChild(scoresDiv);

  // Status: tip-off time + live countdown
  const statusDiv = document.createElement('div');
  statusDiv.className = 'game-status';

  const label = document.createElement('div');
  label.className = 'next-up-label';
  label.textContent = 'NEXT UP';
  statusDiv.appendChild(label);

  const { time, ampm } = splitTime(event.date);
  const timeEl = document.createElement('div');
  timeEl.className = 'status-period';
  timeEl.textContent = `${time} ${ampm}`;
  statusDiv.appendChild(timeEl);

  const countdown = document.createElement('div');
  countdown.className = 'status-clock countdown-timer';
  countdown.dataset.tipoff = event.date;
  statusDiv.appendChild(countdown);

  const oddsInfo = comp.odds?.[0];
  if (oddsInfo?.overUnder != null) {
    const ouEl = document.createElement('div');
    ouEl.className = 'status-ou';
    const ou = oddsInfo.overUnder;
    ouEl.textContent = `O/U ${ou % 1 === 0 ? ou + '.0' : ou}`;
    statusDiv.appendChild(ouEl);
  }

  card.appendChild(statusDiv);
  return card;
}

function buildUpcomingCard(event, isTomorrow) {
  const comp = event.competitions[0];
  const home = getCompetitor(comp, 'home');
  const away = getCompetitor(comp, 'away');
  const { time, ampm } = splitTime(event.date);
  const venue = comp.venue?.fullName || '';

  const card = document.createElement('div');
  card.className = 'upcoming-card';

  const gameDate = new Date(event.date);
  const dateLabel = gameDate.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });

  const timeDiv = document.createElement('div');
  timeDiv.className = 'upcoming-time';
  timeDiv.innerHTML = `<span class="time">${time}</span><span class="ampm">${dateLabel}</span>`;
  card.appendChild(timeDiv);

  function seedBadge(competitor) {
    const seed = competitor.curatedRank?.current;
    if (!seed || seed > 16) return null;
    const b = document.createElement('span');
    b.className = 'seed-badge';
    b.textContent = seed;
    return b;
  }

  const matchup = document.createElement('div');
  matchup.className = 'upcoming-matchup';

  const teamLine = document.createElement('div');
  teamLine.className = 'upcoming-team';
  teamLine.style.display = 'flex';
  teamLine.style.alignItems = 'center';
  teamLine.style.gap = '0.4vw';
  const awayLogo = logoEl(away.team || {});
  teamLine.appendChild(awayLogo);
  const awayBadge = seedBadge(away);
  if (awayBadge) teamLine.appendChild(awayBadge);
  const awayNameSpan = document.createElement('span');
  awayNameSpan.textContent = away.team?.shortDisplayName || away.team?.displayName || 'TBD';
  teamLine.appendChild(awayNameSpan);
  const vsSpan = document.createElement('span');
  vsSpan.className = 'upcoming-vs';
  vsSpan.textContent = '@';
  teamLine.appendChild(vsSpan);
  const homeLogo = logoEl(home.team || {});
  teamLine.appendChild(homeLogo);
  const homeBadge = seedBadge(home);
  if (homeBadge) teamLine.appendChild(homeBadge);
  const homeNameSpan = document.createElement('span');
  homeNameSpan.textContent = home.team?.shortDisplayName || home.team?.displayName || 'TBD';
  teamLine.appendChild(homeNameSpan);
  matchup.appendChild(teamLine);

  card.appendChild(matchup);

  const oddsInfo = comp.odds?.[0];
  const spread = oddsInfo?.details || '';
  const overUnder = oddsInfo?.overUnder;

  if (spread || overUnder != null) {
    const oddsDiv = document.createElement('div');
    oddsDiv.className = 'upcoming-odds';
    if (spread) {
      const spreadEl = document.createElement('div');
      spreadEl.className = 'upcoming-spread';
      spreadEl.textContent = spread;
      oddsDiv.appendChild(spreadEl);
    }
    if (overUnder != null) {
      const ouEl = document.createElement('div');
      ouEl.className = 'upcoming-ou';
      ouEl.textContent = `O/U ${overUnder % 1 === 0 ? overUnder + '.0' : overUnder}`;
      oddsDiv.appendChild(ouEl);
    }
    card.appendChild(oddsDiv);
  } else if (venue) {
    const v = document.createElement('div');
    v.className = 'upcoming-venue';
    v.textContent = venue;
    card.appendChild(v);
  }

  return card;
}


// ── Preview: 5 earliest tomorrow games shown as live ───────────────────────

const PREVIEW_LIVE = false;

function mockTeam(shortName, abbrev) {

}

function mockLeader(catShort, displayValue, playerShort, playerId, teamAbbrev) {

    name: catShort,
    displayName: catShort,
    shortDisplayName: catShort,
    displayValue,
    athlete: {
      id: playerId,
      displayName: playerShort,

      headshot: null,
      team: { id: teamAbbrev }
    }

}

function mockComp(awayName, awayAbbr, awaySeed, awayScore,
                  homeName, homeAbbr, homeSeed, homeScore,
                  detail, period, venue, city, overUnder, oddsDetails,
                  lastPlayText, lastPlayTeam, awayLeaders, homeLeaders) {

    date: '',
    competitions: [{
      competitors: [
        { homeAway: 'away', score: String(awayScore), curatedRank: { current: awaySeed }, team: mockTeam(awayName, awayAbbr), leaders: awayLeaders || [] },
        { homeAway: 'home', score: String(homeScore), curatedRank: { current: homeSeed }, team: mockTeam(homeName, homeAbbr), leaders: homeLeaders || [] },
      ],
      status: { type: { name: 'STATUS_IN_PROGRESS', shortDetail: detail }, period },

      odds: overUnder != null ? [{ overUnder, details: oddsDetails || '' }] : [],

// ── Render ─────────────────────────────────────────────────────────────────

function render(data, tomorrowEvents) {
  const events = data.events || [];

  const live = PREVIEW_LIVE ? MOCK_LIVE_GAMES : events.filter(e => getStatusGroup(e) === 'live');
  const final = events.filter(e => getStatusGroup(e) === 'final');
  const upcoming = events.filter(e => getStatusGroup(e) === 'upcoming');

  // Counts
  document.getElementById('live-count').textContent = live.length;
  document.getElementById('final-count').textContent = final.length;
  const seenIdsCount = new Set();
  const totalUpcoming = [...upcoming, ...tomorrowEvents].filter(e => {
    if (seenIdsCount.has(e.id)) return false;
    seenIdsCount.add(e.id);
    return true;
  }).length;
  document.getElementById('upcoming-count').textContent = totalUpcoming;

  // Live indicator in header
  document.getElementById('live-indicator').style.display = live.length ? 'inline-flex' : 'none';

  // Live panel
  const livePanel = document.getElementById('live-panel');
  livePanel.innerHTML = '';
  livePanel.dataset.count = live.length;
  livePanel.classList.toggle('many-games', live.length > 4);
  if (live.length === 0) {
    livePanel.innerHTML = '<div class="empty">No games in progress</div>';
  } else {
    live.forEach(e => livePanel.appendChild(buildGameCard(e, 'live')));
  }

  // Final panel
  const finalPanel = document.getElementById('final-panel');
  finalPanel.innerHTML = '';
  if (final.length === 0) {
    finalPanel.innerHTML = '<div class="empty">No completed games yet</div>';
  } else {
    final.forEach(e => finalPanel.appendChild(buildGameCard(e, 'final')));
  }

  // Upcoming panel
  const upcomingPanel = document.getElementById('upcoming-panel');
  upcomingPanel.innerHTML = '';
  const seenIds = new Set();
  const allUpcoming = [...upcoming, ...tomorrowEvents].filter(e => {
    if (seenIds.has(e.id)) return false;
    seenIds.add(e.id);
    return true;
  });
  if (allUpcoming.length === 0) {
    upcomingPanel.innerHTML = '<div class="empty">No upcoming games scheduled</div>';
  } else {
    allUpcoming.forEach(e => upcomingPanel.appendChild(buildUpcomingCard(e, tomorrowEvents.includes(e))));
  }

  // Ticker
  const allNames = events.map(e => {
    const comp = e.competitions?.[0];
    const home = getCompetitor(comp, 'home');
    const away = getCompetitor(comp, 'away');
    const aN = away.team?.abbreviation || '?';
    const hN = home.team?.abbreviation || '?';
    const g = getStatusGroup(e);
    if (g === 'live') {
      const aS = away.score ?? '-'; const hS = home.score ?? '-';
      const detail = comp?.status?.type?.shortDetail || 'LIVE';
      return `${aN} ${aS} · ${hN} ${hS} [${detail}]`;
    } else if (g === 'final') {
      return `${aN} ${away.score} · ${hN} ${home.score} [F]`;
    } else {
      return `${aN} @ ${hN} ${fmtTime(e.date)}`;
    }
  });
  document.getElementById('ticker-text').textContent = allNames.join('   ·   ') || 'No games today';

  // Header date
  document.getElementById('header-date').textContent = fmtDate(new Date().toISOString());
}

// ── Fetch loop ─────────────────────────────────────────────────────────────

function tomorrowDateStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10).replace(/-/g, '');
}

async function fetchScores() {
  try {
    const [todayRes, tomorrowRes] = await Promise.all([
      fetch(`${API_BASE}?dates=${todayDateStr()}&_=${Date.now()}`),
      fetch(`${API_BASE}?dates=${tomorrowDateStr()}&_=${Date.now()}`),
    ]);
    if (!todayRes.ok) throw new Error(todayRes.status);
    const data = await todayRes.json();
    const tomorrowData = tomorrowRes.ok ? await tomorrowRes.json() : { events: [] };
    render(data, tomorrowData.events || []);
    const t = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
    document.getElementById('last-refresh').textContent = `Updated ${t}`;
  } catch (err) {
    console.error('Fetch error:', err);
    document.getElementById('ticker-text').textContent = 'Error fetching data — retrying…';
  }
}

// Live clock
function updateClock() {
  document.getElementById('header-time').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });

  const now = Date.now();
  document.querySelectorAll('.countdown-timer[data-tipoff]').forEach(el => {
    const diff = new Date(el.dataset.tipoff).getTime() - now;
    if (diff <= 0) {
      el.textContent = 'TIP OFF';
      return;
    }
    const h = Math.floor(diff / 3_600_000);
    const m = Math.floor((diff % 3_600_000) / 60_000);
    const s = Math.floor((diff % 60_000) / 1_000);
    el.textContent = h > 0
      ? `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
      : `${m}:${String(s).padStart(2, '0')}`;
  });
}

// ── Auto-scroll ────────────────────────────────────────────────────────────

const SCROLL_SPEED = 0.5;        // px per frame (~30px/s at 60fps)
const PAUSE_TOP_FRAMES = 180;    // ~3s at 60fps
const PAUSE_BOTTOM_FRAMES = 240; // ~4s at 60fps

const scrollers = ['live-panel', 'final-panel', 'upcoming-panel'].map(id => ({
  el: document.getElementById(id),
  pos: 0,
  pause: PAUSE_TOP_FRAMES,
  atBottom: false,
}));

function tickScroll() {
  scrollers.forEach(s => {
    const el = s.el;
    if (!el) return;
    const maxScroll = el.scrollHeight - el.clientHeight;
    if (maxScroll <= 0) return; // content fits, nothing to scroll

    if (s.pause > 0) { s.pause--; return; }

    if (s.atBottom) {
      // snap back to top, then pause before scrolling again
      s.pos = 0;
      el.scrollTop = 0;
      s.atBottom = false;
      s.pause = PAUSE_TOP_FRAMES;
      return;
    }

    s.pos = Math.min(s.pos + SCROLL_SPEED, maxScroll);
    el.scrollTop = s.pos;

    if (s.pos >= maxScroll) {
      s.atBottom = true;
      s.pause = PAUSE_BOTTOM_FRAMES;
    }
  });
  requestAnimationFrame(tickScroll);
}

function resetScrollers() {
  scrollers.forEach(s => {
    s.pos = 0;
    s.pause = PAUSE_TOP_FRAMES;
    s.atBottom = false;
    if (s.el) s.el.scrollTop = 0;
  });
}

fetchScores();
updateClock();
requestAnimationFrame(tickScroll);
setInterval(async () => { await fetchScores(); }, 10_000);
setInterval(updateClock, 1_000);
</script>
